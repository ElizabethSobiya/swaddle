services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: swaddle
      POSTGRES_USER: swaddle
      POSTGRES_PASSWORD: swaddle
    ports:
      - "5433:5432"
    volumes:
      - swaddle_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swaddle -d swaddle"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  swaddle_postgres_data:
